<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHL Assessment Recommender</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-text">SHL Recommender</span><span class="logo-dot">.</span>
                    <span class="badge">AI</span>
                </div>
                <div class="status">
                    <span class="status-dot"></span> Online
                </div>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-container" id="chat-container">
            <div class="chat-messages" id="chat-messages">
                <!-- Messages will be injected here -->
                <div class="message assistant">
                    <div class="message-content">
                        Hello! I am the SHL Assessment Recommender AI. How can I assist you with your hiring or development needs today?
                    </div>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="input-container">
            <form id="chat-form" class="chat-form">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="E.g., I'm hiring a Java developer..." 
                    autocomplete="off" 
                    autofocus
                >
                <button type="submit" id="send-btn" class="send-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    
    <!-- Template for Recommendation Cards -->
    <template id="recommendation-template">
        <div class="rec-card">
            <div class="rec-header">
                <span class="rec-type"></span>
            </div>
            <h4 class="rec-title"></h4>
            <a href="#" class="rec-link" target="_blank" rel="noopener noreferrer">
                View in Catalog 
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            </a>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
